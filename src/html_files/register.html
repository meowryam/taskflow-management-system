
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow · Register</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* Design Tokens — aligned with dashboard (olive green) */
:root {
  --color-primary:        #9AAA63;
  --color-primary-dark:   #7a8a4a;
  --color-primary-light:  rgba(154, 170, 99, 0.14);

  --color-success: #6b8e4e;
  --color-danger:  #a8452f;

  --color-white: #fffdf8;
  --color-gray-50:  #faf6ec;
  --color-gray-100: #f3ecdb;
  --color-gray-200: #e6dcc0;
  --color-gray-300: #d3c4a0;
  --color-gray-400: #a89b78;
  --color-gray-500: #7d7256;
  --color-gray-600: #5c5340;
  --color-gray-700: #423c2e;
  --color-gray-800: #2c2820;
  --color-gray-900: #1a1712;

  --font-family: 'Inter', 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-size-xs:   0.75rem;
  --font-size-sm:   0.875rem;
  --font-size-base: 1rem;
  --font-size-lg:   1.125rem;

  --space-1: 0.25rem;
  --space-2: 0.5rem;
  --space-3: 0.75rem;
  --space-4: 1rem;
  --space-5: 1.25rem;
  --space-6: 1.5rem;
  --space-8: 2rem;

  --card-bg: var(--color-white);
  --card-radius: 16px;
  --card-shadow: 0 1px 2px rgba(32, 30, 27, 0.04), 0 12px 32px rgba(32, 30, 27, 0.08);
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family);
  -webkit-font-smoothing: antialiased;
  background:
    linear-gradient(rgba(26, 23, 18, 0.55), rgba(26, 23, 18, 0.55)),
    url('../../docs/screenshots/Login_bg_img.png') center/cover no-repeat fixed;
  color: var(--color-gray-800);
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  padding: 20px;
}

.register-container {
  background-color: rgba(255, 253, 248, 0.92);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: var(--card-radius);
  width: 100%;
  max-width: 420px;
  padding: var(--space-10, 2.5rem) var(--space-8);
  box-shadow: var(--card-shadow);
  animation: card-rise 0.5s ease;
}

@keyframes card-rise {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

.brand-header {
  text-align: center;
  margin-bottom: var(--space-6);
}

.brand-header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--color-gray-900);
  letter-spacing: -0.01em;
}

.brand-header p {
  font-size: var(--font-size-sm);
  color: var(--color-gray-500);
  margin-top: var(--space-1);
}

.form-group {
  margin-bottom: var(--space-5);
}

.form-group label {
  display: block;
  font-size: var(--font-size-sm);
  font-weight: 500;
  margin-bottom: var(--space-2);
  color: var(--color-gray-700);
}

.form-control {
  width: 100%;
  padding: var(--space-3) var(--space-4);
  font-size: var(--font-size-base);
  font-family: var(--font-family);
  border: 1px solid var(--color-gray-200);
  border-radius: 8px;
  background-color: var(--color-white);
  color: var(--color-gray-800);
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

.form-control::placeholder {
  color: var(--color-gray-400);
}

.form-control:focus {
  border-color: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-light);
}

select.form-control {
  cursor: pointer;
}

.btn-submit {
  width: 100%;
  padding: var(--space-3) var(--space-6);
  font-family: var(--font-family);
  font-size: var(--font-size-base);
  font-weight: 600;
  color: var(--color-white);
  background-color: var(--color-primary);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: background-color 0.15s ease, transform 0.05s ease;
}

.btn-submit:hover {
  background-color: var(--color-primary-dark);
}

.btn-submit:active {
  transform: scale(0.99);
}

.password-wrapper {
  position: relative;
}

.password-wrapper .form-control {
  padding-right: 40px;
}

.toggle-password {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  background: none;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--color-gray-400);
  line-height: 1;
}

.toggle-password:hover {
  color: var(--color-gray-600);
  background-color: var(--color-gray-100);
}

.strength-section {
  margin-top: var(--space-2);
}

.strength-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}

.strength-label {
  font-size: var(--font-size-xs);
  font-weight: 600;
  color: var(--color-gray-500);
}

.strength-meter {
  width: 100%;
  height: 4px;
  appearance: none;
  -webkit-appearance: none;
  border-radius: 2px;
  overflow: hidden;
}

.strength-meter::-webkit-progress-bar {
  background-color: var(--color-gray-200);
  border-radius: 2px;
}

.strength-meter::-webkit-progress-value {
  border-radius: 2px;
  transition: width 0.2s ease, background-color 0.2s ease;
}

.strength-meter--score-0::-webkit-progress-value { background-color: var(--color-gray-300); }
.strength-meter--score-1::-webkit-progress-value { background-color: #c0392b; }
.strength-meter--score-2::-webkit-progress-value { background-color: #e67e22; }
.strength-meter--score-3::-webkit-progress-value { background-color: #f39c12; }
.strength-meter--score-4::-webkit-progress-value { background-color: #6b8e4e; }
.strength-meter--score-5::-webkit-progress-value { background-color: #2ecc71; }

.strength-checklist {
  list-style: none;
  padding: 0;
  margin: var(--space-2) 0 0;
  font-size: var(--font-size-xs);
}

.strength-checklist li {
  padding: 2px 0;
  display: flex;
  align-items: center;
  gap: 4px;
}

.check-unmet {
  color: var(--color-gray-500);
}

.check-unmet::before {
  content: '✗';
  color: #c0392b;
  font-weight: bold;
}

.check-met {
  color: #2d6a2e;
}

.check-met::before {
  content: '✓';
  color: #27ae60;
  font-weight: bold;
}

.form-footer {
  text-align: center;
  margin-top: var(--space-6);
  font-size: var(--font-size-sm);
  color: var(--color-gray-500);
}

.form-footer a {
  color: var(--color-primary);
  text-decoration: none;
  font-weight: 600;
}

.form-footer a:hover {
  text-decoration: underline;
}

.form-hint {
  display: block;
  font-size: var(--font-size-xs);
  color: var(--color-danger);
  margin-top: var(--space-1);
  min-height: 1em;
}

.form-hint--success {
  color: var(--color-success);
}

.feedback-message {
  padding: var(--space-3) var(--space-4);
  border-radius: 8px;
  font-size: var(--font-size-sm);
  margin-bottom: var(--space-5);
  display: none;
  line-height: 1.4;
}

.feedback-message.error {
  display: block;
  background-color: rgba(168, 69, 47, 0.08);
  color: var(--color-danger);
  border: none;
}

.feedback-message.success {
  display: block;
  background-color: rgba(107, 142, 78, 0.08);
  color: var(--color-success);
  border: none;
}
</style>
</head>
<body>

<div class="register-container">
<div class="brand-header">
<h1>TaskFlow</h1>
<p>Create a new team account</p>
</div>

<!-- Inline Error / Success Alert -->
<div id="feedback-message" class="feedback-message"></div>

<form id="register-form" novalidate>
<div class="form-group">
<label for="username">Username</label>
<input 
type="text" 
id="username" 
class="form-control" 
placeholder="Enter username (min 4 characters)" 
autocomplete="off"
aria-describedby="usernameHint"
/>
<span id="usernameHint" class="form-hint" aria-live="polite"></span>
</div>

<div class="form-group">
<label for="email">Email</label>
<input 
type="email" 
id="email" 
class="form-control" 
placeholder="Enter email address" 
autocomplete="email"
/>
</div>

<div class="form-group">
<label for="password">Password</label>
<div class="password-wrapper">
<input 
type="password" 
id="password" 
class="form-control" 
placeholder="Enter password"
autocomplete="new-password"
/>
<button type="button" class="toggle-password" id="toggle-password" aria-label="Show password">👁</button>
</div>
<div class="strength-section">
<div class="strength-header">
<span class="strength-label">Strength</span>
<span class="strength-label" id="password-strength-label"></span>
</div>
<progress id="password-strength-meter" class="strength-meter strength-meter--score-0" value="0" max="5"></progress>
<ul id="password-checklist" class="strength-checklist">
<li class="check-unmet">At least 8 characters</li>
<li class="check-unmet">At least 1 uppercase letter</li>
<li class="check-unmet">At least 1 lowercase letter</li>
<li class="check-unmet">At least 1 number</li>
<li class="check-unmet">At least 1 special character</li>
</ul>
</div>
</div>

<div class="form-group">
<label for="role">Role</label>
<select id="role" class="form-control">
<option value="">Select a role</option>
<option value="Admin">Admin</option>
<option value="Manager">Manager</option>
<option value="Team Member">Team Member</option>
</select>
</div>

<button type="submit" class="btn-submit">Register</button>
</form>

<p class="form-footer">Already have an account? <a href="login.html">Sign in</a></p>
</div>

<!-- Attach JavaScript Logic -->
<script src="../modules/jwt.js" defer></script>
<script src="../modules/register.js" defer></script>
</body>
</html>
